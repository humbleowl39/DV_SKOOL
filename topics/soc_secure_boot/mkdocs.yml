site_name: SoC Secure Boot
site_description: Hardware Root of Trust, chain of trust, crypto, attack surface, BootROM DV
site_url: https://humbleowl39.github.io/DV_SKOOL/soc_secure_boot/

theme:
  name: material
  language: ko
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 다크 모드로 전환
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 라이트 모드로 전환
  icon:
    repo: fontawesome/brands/github

repo_url: https://github.com/humbleowl39/DV_SKOOL
repo_name: humbleowl39/DV_SKOOL
edit_uri: edit/main/topics/soc_secure_boot/docs/

extra_css:
  - stylesheets/extra.css

plugins:
  - search:
      lang:
        - en
        - ko
  - tags

nav:
  - "← DV SKOOL": "https://humbleowl39.github.io/DV_SKOOL/"
  - "🏠 코스 홈": index.md
  - "📚 학습 모듈":
      - "Unit 1: Hardware Root of Trust (하드웨어 신뢰 기반)": 01_hardware_root_of_trust.md
      - "Unit 2: Chain of Trust & Boot Stages (신뢰 체인과 부팅 단계)": 02_chain_of_trust_boot_stages.md
      - "Unit 3: Secure Boot 암호학 — 서명 검증과 키 관리": 03_crypto_in_boot.md
      - "Unit 4: Boot Device & Boot Mode (부팅 장치와 부팅 모드)": 04_boot_device_and_boot_mode.md
      - "Unit 5: 공격 표면과 방어": 05_attack_surface_and_defense.md
      - "SoC Secure Boot Flow — Quick Reference Card": 06_quick_reference_card.md
      - "Unit 7: BootROM DV 검증 방법론": 07_bootrom_dv_methodology.md
  - "📋 코스 개요": _legacy_overview.md
  - "📖 용어집": glossary.md
  - "❓ 퀴즈":
      - "퀴즈 인덱스": quiz/index.md

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path:
        - docs
        - ../_shared
      check_paths: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.keys
  - pymdownx.smartsymbols
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  homepage: https://humbleowl39.github.io/DV_SKOOL/
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/humbleowl39/DV_SKOOL
  generator: false

copyright: DV SKOOL — 학습용 자료
