site_name: TOE
site_description: TCP/IP Offload Engine — 아키텍처, 핵심 기능, DV 방법론
site_url: https://humbleowl39.github.io/DV_SKOOL/toe/

theme:
  name: material
  language: ko
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.top
    - navigation.expand
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 다크 모드로 전환
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 라이트 모드로 전환
  icon:
    repo: fontawesome/brands/github

repo_url: https://github.com/humbleowl39/DV_SKOOL
repo_name: humbleowl39/DV_SKOOL
edit_uri: edit/main/topics/toe/docs/

nav:
  - "TCP Offload Engine (TOE) — 개요 및 컨셉 맵": index.md
  - "Unit 1: TCP/IP 기본 + TOE 개념": 01_tcp_ip_and_toe_concept.md
  - "Unit 2: TOE 아키텍처": 02_toe_architecture.md
  - "Unit 3: TOE 핵심 기능 상세": 03_toe_key_functions.md
  - "Unit 4: TOE DV 검증 전략": 04_toe_dv_methodology.md
  - "TOE — Quick Reference Card": 05_quick_reference_card.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.keys
  - pymdownx.smartsymbols
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/humbleowl39/DV_SKOOL
  generator: false

copyright: DV SKOOL — 학습용 자료
