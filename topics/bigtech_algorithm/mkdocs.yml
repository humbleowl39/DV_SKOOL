site_name: BigTech Algorithm
site_description: 코딩 인터뷰 — Big-O, 자료구조, 알고리즘 + SystemVerilog 예제
site_url: https://humbleowl39.github.io/DV_SKOOL/bigtech_algorithm/

theme:
  name: material
  language: ko
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 다크 모드로 전환
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 라이트 모드로 전환
  icon:
    repo: fontawesome/brands/github

repo_url: https://github.com/humbleowl39/DV_SKOOL
repo_name: humbleowl39/DV_SKOOL
edit_uri: edit/main/topics/bigtech_algorithm/docs/

extra_css:
  - stylesheets/extra.css

plugins:
  - search:
      lang:
        - en
        - ko
  - tags

nav:
  - "← DV SKOOL": "https://humbleowl39.github.io/DV_SKOOL/"
  - "🏠 코스 홈": index.md
  - "📚 학습 모듈":
      - "Module 01 — Big-O & Pattern Thinking": 01_big_o_explained.md
      - "Module 02 — Array & Hash Map": 02_array_hashmap_explained.md
      - "Module 03 — Two Pointers & Sliding Window": 03_two_pointers_sliding_window_explained.md
      - "Module 04 — Stack & Binary Search": 04_stack_binary_search_explained.md
      - "Module 05 — Tree & BFS/DFS": 05_tree_bfs_dfs_explained.md
      - "Module 06 — Dynamic Programming": 06_dynamic_programming_explained.md
      - "Module 07 — Interview Strategy": 07_interview_strategy.md
  - "📋 코스 개요": _legacy_overview.md
  - "📖 용어집": glossary.md
  - "❓ 퀴즈":
      - "퀴즈 인덱스": quiz/index.md
      - "Module 01 Quiz": quiz/01_big_o_explained_quiz.md
      - "Module 02 Quiz": quiz/02_array_hashmap_explained_quiz.md
      - "Module 03 Quiz": quiz/03_two_pointers_sliding_window_explained_quiz.md
      - "Module 04 Quiz": quiz/04_stack_binary_search_explained_quiz.md
      - "Module 05 Quiz": quiz/05_tree_bfs_dfs_explained_quiz.md
      - "Module 06 Quiz": quiz/06_dynamic_programming_explained_quiz.md
      - "Module 07 Quiz": quiz/07_interview_strategy_quiz.md

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path:
        - docs
        - ../_shared
      check_paths: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.keys
  - pymdownx.smartsymbols
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  homepage: https://humbleowl39.github.io/DV_SKOOL/
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/humbleowl39/DV_SKOOL
  generator: false

copyright: DV SKOOL — 학습용 자료
