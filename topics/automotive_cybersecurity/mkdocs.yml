site_name: Automotive Cybersecurity
site_description: CAN bus, automotive SoC 보안, Tesla FSD case study, attack surface & defense
site_url: https://humbleowl39.github.io/DV_SKOOL/automotive_cybersecurity/

theme:
  name: material
  language: ko
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 다크 모드로 전환
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 라이트 모드로 전환
  icon:
    repo: fontawesome/brands/github

repo_url: https://github.com/humbleowl39/DV_SKOOL
repo_name: humbleowl39/DV_SKOOL
edit_uri: edit/main/topics/automotive_cybersecurity/docs/

extra_css:
  - stylesheets/extra.css

plugins:
  - search:
      lang:
        - en
        - ko
  - tags

nav:
  - "🏠 DV SKOOL 메인": "https://humbleowl39.github.io/DV_SKOOL/"
  - "코스 홈": index.md
  - "학습 모듈":
      - "Module 01 — CAN Bus Fundamentals": 01_can_bus_fundamentals.md
      - "Module 02 — Automotive SoC Security": 02_automotive_soc_security.md
      - "Module 03 — Tesla FSD Case Study": 03_tesla_fsd_case_study.md
      - "Module 04 — Attack Surface & Defense": 04_attack_surface_and_defense.md
      - "Module 05 — Quick Reference Card": 05_quick_reference_card.md
  - "코스 개요": _legacy_overview.md
  - "용어집": glossary.md
  - "퀴즈":
      - "퀴즈 인덱스": quiz/index.md
      - "Module 01 Quiz": quiz/01_can_bus_fundamentals_quiz.md
      - "Module 02 Quiz": quiz/02_automotive_soc_security_quiz.md
      - "Module 03 Quiz": quiz/03_tesla_fsd_case_study_quiz.md
      - "Module 04 Quiz": quiz/04_attack_surface_and_defense_quiz.md
      - "Module 05 Quiz": quiz/05_quick_reference_card_quiz.md

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.keys
  - pymdownx.smartsymbols
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/humbleowl39/DV_SKOOL
  generator: false

copyright: DV SKOOL — 학습용 자료
