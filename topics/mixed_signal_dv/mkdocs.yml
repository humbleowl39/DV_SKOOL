site_name: Mixed-Signal DV — SPICE · AMS · RNM
site_description: DRAM/Analog Mixed-Signal 검증 입문 — SPICE/AMS/RNM 시뮬레이션 방법론 + DLL·IO Buffer·Sense Amp Deep Dive
site_url: https://humbleowl39.github.io/DV_SKOOL/mixed_signal_dv/

theme:
  name: material
  language: ko
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: 다크 모드로 전환
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: 라이트 모드로 전환
  icon:
    repo: fontawesome/brands/github

repo_url: https://github.com/humbleowl39/DV_SKOOL
repo_name: humbleowl39/DV_SKOOL
edit_uri: edit/main/topics/mixed_signal_dv/docs/

extra_css:
  - stylesheets/extra.css

plugins:
  - search:
      lang:
        - en
        - ko
  - tags
  - d2:
      executable: d2
      layout: elk
      theme: 0
      dark_theme: 200
      pad: 20
      scale: -1.0

