      - "C. Glossary (EN, ISO 11179)": appendix_c_glossary.md
      - "C. 용어집 (KO)": appendix_c_glossary_ko.md
      - "D. Analog IP Catalogue (PLL · ADC · DAC · LDO · Bandgap · PMU · Sensors · SerDes)": appendix_d_analog_ip_catalogue.md
  - "❓ 퀴즈":
      - "퀴즈 인덱스": quiz/index.md
      - "Ch01 퀴즈": quiz/ch01_quiz.md
      - "Ch02 퀴즈": quiz/ch02_quiz.md
      - "Ch03 퀴즈": quiz/ch03_quiz.md
      - "Ch04 퀴즈": quiz/ch04_quiz.md
      - "Ch05 퀴즈": quiz/ch05_quiz.md
      - "Ch06 퀴즈": quiz/ch06_quiz.md
      - "Ch07 퀴즈": quiz/ch07_quiz.md
      - "Ch08 퀴즈": quiz/ch08_quiz.md
      - "Ch09 퀴즈": quiz/ch09_quiz.md
      - "Ch10 퀴즈": quiz/ch10_quiz.md
      - "Ch11 퀴즈": quiz/ch11_quiz.md
      - "Ch12 퀴즈": quiz/ch12_quiz.md

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.keys
  - pymdownx.smartsymbols
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  homepage: https://humbleowl39.github.io/DV_SKOOL/
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/humbleowl39/DV_SKOOL
  generator: false

copyright: DV SKOOL — Mixed-Signal DV 학습용 (스펙 원문 복제 아님 — 학습 목적 인용/요약)
