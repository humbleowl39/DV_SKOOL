site_name: RDMA (InfiniBand & RoCEv2)
site_description: RDMA — InfiniBand 프로토콜, RoCEv2, QP/Memory Model, DV 전략
site_url: https://humbleowl39.github.io/DV_SKOOL/rdma/

theme:
  name: material
  language: ko
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 다크 모드로 전환
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 라이트 모드로 전환
  icon:
    repo: fontawesome/brands/github

repo_url: https://github.com/humbleowl39/DV_SKOOL
repo_name: humbleowl39/DV_SKOOL
edit_uri: edit/main/topics/rdma/docs/

extra_css:
  - stylesheets/extra.css

plugins:
  - search:
      lang:
        - en
        - ko
  - tags

nav:
  - "← DV SKOOL": "https://humbleowl39.github.io/DV_SKOOL/"
  - "🏠 코스 홈": index.md
  - "📚 학습 모듈":
      - "Module 01: RDMA 동기와 핵심 모델": 01_rdma_motivation.md
      - "Module 02: InfiniBand 프로토콜 스택": 02_ib_protocol_stack.md
      - "Module 03: RoCEv2 — Ethernet 위의 RDMA": 03_rocev2.md
      - "Module 04: Service Types & QP FSM": 04_service_types_qp.md
      - "Module 05: Memory Model (PD/MR/Keys/IOVA)": 05_memory_model.md
      - "Module 06: Data Path Operations": 06_data_path.md
      - "Module 07: Congestion Control & Error Handling": 07_congestion_error.md
      - "Module 08: RDMA-TB 검증 환경 & DV 전략": 08_rdma_tb_dv.md
      - "Quick Reference Card": 09_quick_reference_card.md
  - "📋 코스 개요": _legacy_overview.md
  - "📖 용어집": glossary.md
  - "❓ 퀴즈":
      - "퀴즈 인덱스": quiz/index.md

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true

extra:
  homepage: https://humbleowl39.github.io/DV_SKOOL/
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/humbleowl39/DV_SKOOL
  generator: false

copyright: DV SKOOL — 학습용 자료
