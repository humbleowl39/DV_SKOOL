site_name: MMU
site_description: Memory Management Unit — 페이지 테이블, TLB, IOMMU/SMMU, 성능 분석, DV 방법론
site_url: https://humbleowl39.github.io/DV_SKOOL/mmu/

theme:
  name: material
  language: ko
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.top
    - navigation.expand
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 다크 모드로 전환
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 라이트 모드로 전환
  icon:
    repo: fontawesome/brands/github

repo_url: https://github.com/humbleowl39/DV_SKOOL
repo_name: humbleowl39/DV_SKOOL
edit_uri: edit/main/topics/mmu/docs/

nav:
  - "MMU (Memory Management Unit) — 개요 및 컨셉 맵": index.md
  - "Unit 1: MMU 기본 개념 및 주소 변환": 01_mmu_fundamentals.md
  - "Unit 2: Page Table 구조": 02_page_table_structure.md
  - "Unit 3: TLB (Translation Lookaside Buffer)": 03_tlb.md
  - "Unit 4: IOMMU / SMMU — SoC에서의 MMU": 04_iommu_smmu.md
  - "Unit 5: MMU 성능 분석 및 최적화": 05_performance_analysis.md
  - "Unit 6: MMU DV 검증 방법론": 06_mmu_dv_methodology.md
  - "MMU — Quick Reference Card": 07_quick_reference_card.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.keys
  - pymdownx.smartsymbols
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/humbleowl39/DV_SKOOL
  generator: false

copyright: DV SKOOL — 학습용 자료
