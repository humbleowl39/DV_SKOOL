name: Build and Deploy DV_SKOOL

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install D2 (for mkdocs-d2-plugin)
        run: |
          D2_VERSION="0.7.1"
          curl -fsSL "https://github.com/terrastruct/d2/releases/download/v${D2_VERSION}/d2-v${D2_VERSION}-linux-amd64.tar.gz" -o /tmp/d2.tar.gz
          mkdir -p /tmp/d2_extract
          tar xzf /tmp/d2.tar.gz -C /tmp/d2_extract
          sudo cp "/tmp/d2_extract/d2-v${D2_VERSION}/bin/d2" /usr/local/bin/d2
          sudo chmod +x /usr/local/bin/d2
          d2 --version

      - name: Build all topic sites
        run: |
          set -e
          mkdir -p _site

          # Copy landing page
          cp -r landing/* _site/

          # Build each topic site into _site/<slug>/
          # Skip directories without mkdocs.yml (e.g. topics/_shared/ holds shared abbr only).
          for topic_dir in topics/*/; do
            slug=$(basename "$topic_dir")
            if [ ! -f "$topic_dir/mkdocs.yml" ]; then
              echo "==> Skipping $slug (no mkdocs.yml)"
              continue
            fi
            echo "==> Building topic: $slug"
            cd "$topic_dir"
            mkdocs build --strict --site-dir "../../_site/$slug"
            cd ../..
          done

          echo "==> Build summary:"
          ls _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
